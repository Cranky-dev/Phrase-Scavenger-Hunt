name: Generate Automated Release

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'src/main/resources/plugin.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    # This sets up Gradle dynamically on the virtual machine, bypassing your missing gradlew script!
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5' # Forces the runner to use Gradle 8.5 automatically

    # Compiles using the runner's globally configured gradle engine instead of the local script wrapper
    - name: Build Fat JAR via Shadow
      run: gradle build

    - name: Deploy GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Scavenger Hunt Release v1.0.${{ github.run_number }}
        body: |
          🤖 **Automated Plugin Update Build**
          This release was generated automatically following code adjustments.
        draft: false
        prerelease: false
        files: build/libs/*-all.jar
