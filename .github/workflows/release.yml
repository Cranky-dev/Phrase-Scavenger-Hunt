name: Generate Automated Release

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'src/main/resources/plugin.yml'

permissions:
  contents: write # Crucial: Allows GitHub to write and save the release artifacts

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2 # Fixed version wrapper

    # Setting up Java with proper secure environment handshakes
    - name: Set up JDK 21
      uses: actions/setup-java@v4.7.0 # Fixed version wrapper
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permissions to Gradle
      run: chmod +x ./gradlew

    - name: Build Fat JAR via Shadow
      run: ./gradlew build

    - name: Deploy GitHub Release
      uses: softprops/action-gh-release@v2.0.9 # Fixed version wrapper
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Scavenger Hunt Release v1.0.${{ github.run_number }}
        body: |
          🤖 **Automated Plugin Update Build**
          This release was generated automatically following code adjustments.
          
          **Commit Message:** ${{ github.event.head_commit.message }}
          **Triggered By:** @${{ github.actor }}
        draft: false
        prerelease: false
        files: build/libs/*-all.jar
